services:
  - type: web
    name: astroweek
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
