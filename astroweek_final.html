<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroWeek · BLONDY club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --rose: #c4607c;
        --rose-dark: #2a0a18;
        --rose-mid: #6a3048;
        --rose-soft: #907080;
        --rose-muted: #c090a4;
        --rose-lt: #d4b5c4;
        --rose-bg: #fdf8f9;
        --border: #edd8e2;
        --font-serif: 'Playfair Display', Georgia, serif;
        --font-sans: 'DM Sans', sans-serif;
    }

    html, body {
        height: 100%;
        font-family: var(--font-sans);
        background: #0e0008;
        color: var(--rose-dark);
        overflow: hidden;
    }

    #app {
        width: 100%;
        height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
    }

    .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        transition: opacity .4s ease, transform .4s ease;
        overflow: hidden;
    }

    .screen.hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateX(32px);
    }

    .screen.slide-left.hidden {
        transform: translateX(-32px);
    }

    /* ══════════════════════════════
       ЭКРАН 1: ВВОД
    ══════════════════════════════ */
    #s-input {
        background: #0e0008;
        justify-content: space-between;
        padding: 52px 32px 44px;
    }

    .input-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .input-brand-left {
        font-size: 9px;
        font-weight: 300;
        letter-spacing: 3px;
        color: rgba(255,255,255,.3);
        text-transform: uppercase;
        line-height: 1.8;
    }

    .input-brand-right {
        font-size: 9px;
        font-weight: 300;
        letter-spacing: 2px;
        color: rgba(255,255,255,.2);
        text-transform: uppercase;
        text-align: right;
    }

    .input-hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 24px 0 20px;
    }

    .hero-word {
        font-family: var(--font-serif);
        font-weight: 900;
        color: #fff;
        line-height: 0.88;
        letter-spacing: -2px;
        display: block;
        font-size: clamp(72px, 22vw, 96px);
    }

    .hero-word.accent {
        font-style: italic;
        color: var(--rose);
    }

    .hero-mid {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 14px 0;
    }

    .hero-mid-line {
        flex: 1;
        height: 0.5px;
        background: rgba(255,255,255,.12);
    }

    .hero-mid-label {
        font-size: 9px;
        letter-spacing: 3px;
        color: rgba(255,255,255,.25);
        text-transform: uppercase;
    }

    .hero-word-sm {
        font-family: var(--font-serif);
        font-size: clamp(28px, 9vw, 40px);
        font-weight: 400;
        font-style: italic;
        color: rgba(255,255,255,.35);
        line-height: 1.1;
        letter-spacing: -1px;
    }

    .input-fields {
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .field-row-split {
        display: flex;
        gap: 20px;
    }

    .field-row-split .ifield { flex: 1; }

    .ifield {
        border-bottom: 0.5px solid rgba(255,255,255,.15);
        padding: 14px 0 12px;
        transition: border-color .2s;
    }

    .ifield:focus-within {
        border-color: var(--rose);
    }

    .ifield label {
        display: block;
        font-size: 8px;
        font-weight: 400;
        letter-spacing: 2.5px;
        color: rgba(255,255,255,.25);
        text-transform: uppercase;
        margin-bottom: 7px;
    }

    .ifield input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--font-serif);
        font-size: 16px;
        font-style: italic;
        color: rgba(255,255,255,.7);
        caret-color: var(--rose);
        -webkit-appearance: none;
    }

    .ifield input::placeholder {
        color: rgba(255,255,255,.18);
        font-style: normal;
        font-family: var(--font-sans);
        font-size: 13px;
        letter-spacing: 0.5px;
    }

    .error-msg {
        font-size: 11px;
        color: #f87090;
        margin-top: 12px;
        letter-spacing: 0.3px;
        display: none;
        font-style: italic;
        font-family: var(--font-serif);
    }

    .error-msg.visible { display: block; }

    .input-cta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 22px;
    }

    .cta-label {
        font-family: var(--font-serif);
        font-size: 14px;
        font-style: italic;
        color: rgba(255,255,255,.4);
    }

    .cta-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: var(--rose);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform .15s, opacity .15s;
        flex-shrink: 0;
    }

    .cta-btn:active { transform: scale(.93); opacity: .85; }

    .cta-arrow {
        width: 18px;
        height: 18px;
        border-top: 2px solid white;
        border-right: 2px solid white;
        transform: rotate(45deg) translate(-2px, 2px);
    }

    /* ══════════════════════════════
       ЭКРАН 2: ЗАГРУЗКА
    ══════════════════════════════ */
    #s-loading {
        background: #0e0008;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 40px 32px;
    }

    .load-title {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 400;
        font-style: italic;
        color: rgba(255,255,255,.6);
        text-align: center;
    }

    .steps {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 100%;
    }

    .step {
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all .4s ease;
    }

    .step-ico {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 0.5px solid rgba(255,255,255,.15);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 11px;
        color: rgba(255,255,255,.25);
        transition: all .4s;
        font-family: var(--font-serif);
        font-style: italic;
    }

    .step.active .step-ico { border-color: var(--rose); color: var(--rose); }
    .step.done .step-ico   { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.35); }

    .step-txt {
        font-size: 12px;
        letter-spacing: 0.3px;
        color: rgba(255,255,255,.22);
        transition: color .4s;
    }

    .step.active .step-txt { color: rgba(255,255,255,.65); }
    .step.done .step-txt   { color: rgba(255,255,255,.28); }

    .pulse-dots { display: flex; gap: 8px; }

    .pdot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--rose);
        animation: pdot 1.4s ease-in-out infinite;
        opacity: .4;
    }

    .pdot:nth-child(2) { animation-delay: .2s; }
    .pdot:nth-child(3) { animation-delay: .4s; }

    @keyframes pdot {
        0%, 100% { opacity: .3; transform: scale(.8); }
        50%       { opacity: 1; transform: scale(1.2); }
    }

    /* ══════════════════════════════
       ЭКРАН 3: ПРОГНОЗ
    ══════════════════════════════ */
    #s-forecast { background: var(--rose-bg); }

    .fc-scroll {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 52px 28px 48px;
    }

    .fc-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
    }

    .fc-back {
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--font-sans);
        font-size: 9px;
        letter-spacing: 2px;
        color: var(--rose-muted);
        text-transform: uppercase;
        padding: 0;
    }

    .fc-week-label {
        font-size: 9px;
        letter-spacing: 1.5px;
        color: var(--rose-lt);
        text-transform: uppercase;
    }

    .fc-sign {
        font-family: var(--font-serif);
        font-weight: 900;
        color: var(--rose-dark);
        line-height: 0.9;
        letter-spacing: -2px;
        margin-bottom: 8px;
        white-space: nowrap;
    }

    .fc-sign-sub {
        font-family: var(--font-serif);
        font-size: 15px;
        font-style: italic;
        color: var(--rose);
        margin-bottom: 20px;
    }

    .fc-divider {
        height: 0.5px;
        background: var(--border);
        margin-bottom: 20px;
    }

    .fc-summary-text {
        font-family: var(--font-serif);
        font-size: 15px;
        font-style: italic;
        color: var(--rose-mid);
        line-height: 1.65;
        margin-bottom: 26px;
    }

    .fc-days {
        display: flex;
        gap: 3px;
        margin-bottom: 28px;
    }

    .fc-day {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        border-radius: 8px;
    }

    .fc-day-name {
        display: block;
        font-size: 8px;
        letter-spacing: 1px;
        color: var(--rose-lt);
        text-transform: uppercase;
    }

    .fc-day-num {
        display: block;
        font-family: var(--font-serif);
        font-size: 15px;
        font-weight: 900;
        color: #9a7080;
        margin-top: 3px;
    }

    .fc-day.active { background: var(--rose-dark); }
    .fc-day.active .fc-day-name { color: rgba(255,255,255,.35); }
    .fc-day.active .fc-day-num  { color: #fff; }
    .fc-day.fav .fc-day-num { color: var(--rose); }

    .fc-section-label {
        font-size: 8px;
        letter-spacing: 3px;
        color: var(--rose-lt);
        text-transform: uppercase;
        margin-bottom: 20px;
    }

    .fc-item {
        margin-bottom: 24px;
        padding-bottom: 24px;
        border-bottom: 0.5px solid var(--border);
    }

    .fc-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }

    .fc-item-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 9px;
    }

    .fc-item-title {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 900;
        color: var(--rose-dark);
        letter-spacing: -0.5px;
    }

    .fc-score-num {
        font-family: var(--font-serif);
        font-size: 30px;
        font-weight: 900;
        color: var(--rose);
        line-height: 1;
    }

    .fc-score-max {
        font-size: 10px;
        color: var(--rose-lt);
        font-weight: 300;
        margin-left: 1px;
    }

    .fc-bar {
        height: 1.5px;
        background: var(--border);
        border-radius: 1px;
        margin-bottom: 11px;
        overflow: hidden;
    }

    .fc-bar-fill {
        height: 100%;
        background: var(--rose);
        border-radius: 1px;
        width: 0%;
        transition: width 1s ease;
    }

    .fc-item-text {
        font-family: var(--font-serif);
        font-size: 13px;
        font-style: italic;
        color: var(--rose-soft);
        line-height: 1.7;
    }

    .fc-refresh {
        margin-top: 36px;
        width: 100%;
        padding: 14px;
        background: transparent;
        border: 0.5px solid var(--border);
        border-radius: 4px;
        font-family: var(--font-sans);
        font-size: 9px;
        letter-spacing: 3px;
        color: var(--rose-muted);
        text-transform: uppercase;
        cursor: pointer;
        transition: background .2s;
    }

    .fc-refresh:active { background: var(--border); }

    @media (min-width: 500px) {
        body { display: flex; align-items: center; justify-content: center; }
        #app { height: 860px; border-radius: 44px; overflow: hidden; box-shadow: 0 40px 120px rgba(0,0,0,.5); }
    }
    </style>
</head>
<body>
<div id="app">

    <!-- ЭКРАН 1: ВВОД -->
    <div id="s-input" class="screen">
        <div class="input-top">
            <div class="input-brand-left">@blondy_club<br><span style="color:rgba(255,255,255,.1)">2026</span></div>
            <div class="input-brand-right">Астро<br>неделя</div>
        </div>
        <div class="input-hero">
            <span class="hero-word">Astro</span>
            <span class="hero-word accent">Week.</span>
            <div class="hero-mid">
                <div class="hero-mid-line"></div>
                <div class="hero-mid-label">твой гороскоп</div>
                <div class="hero-mid-line"></div>
            </div>
            <span class="hero-word-sm">на каждую<br>неделю</span>
        </div>
        <div class="input-fields">
            <div class="ifield">
                <label for="f-date">Дата рождения</label>
                <input id="f-date" type="text" placeholder="ДД · ММ · ГГГГ" maxlength="10" inputmode="numeric">
            </div>
            <div class="field-row-split">
                <div class="ifield">
                    <label for="f-time">Время</label>
                    <input id="f-time" type="text" placeholder="ЧЧ:ММ" maxlength="5" inputmode="numeric">
                </div>
                <div class="ifield">
                    <label for="f-city">Город</label>
                    <input id="f-city" type="text" placeholder="Москва">
                </div>
            </div>
            <div id="error-msg" class="error-msg"></div>
            <div class="input-cta">
                <span class="cta-label">читать звёзды</span>
                <button id="btn-submit" class="cta-btn"><div class="cta-arrow"></div></button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: ЗАГРУЗКА -->
    <div id="s-loading" class="screen hidden">
        <div class="load-title">Читаем звёзды для вас</div>
        <div class="steps">
            <div class="step idle" id="step1"><div class="step-ico">I</div><span class="step-txt">Определяем часовой пояс и координаты</span></div>
            <div class="step idle" id="step2"><div class="step-ico">II</div><span class="step-txt">Вычисляем положения планет</span></div>
            <div class="step idle" id="step3"><div class="step-ico">III</div><span class="step-txt">Составляем прогноз</span></div>
        </div>
        <div class="pulse-dots">
            <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
        </div>
    </div>

    <!-- ЭКРАН 3: ПРОГНОЗ -->
    <div id="s-forecast" class="screen hidden">
        <div class="fc-scroll">
            <div class="fc-top">
                <button class="fc-back" id="btn-back">← назад</button>
                <span class="fc-week-label" id="fc-week-label">—</span>
            </div>
            <div class="fc-sign" id="fc-sign">—</div>
            <div class="fc-sign-sub" id="fc-sign-sub">—</div>
            <div class="fc-divider"></div>
            <div class="fc-summary-text" id="fc-summary"></div>
            <div class="fc-days" id="fc-days"></div>
            <div class="fc-section-label">прогноз на неделю</div>

            <div class="fc-item">
                <div class="fc-item-head">
                    <span class="fc-item-title">Любовь</span>
                    <span><span class="fc-score-num" id="sc-love">—</span><span class="fc-score-max">/5</span></span>
                </div>
                <div class="fc-bar"><div class="fc-bar-fill" id="bar-love"></div></div>
                <div class="fc-item-text" id="txt-love"></div>
            </div>

            <div class="fc-item">
                <div class="fc-item-head">
                    <span class="fc-item-title">Дружба</span>
                    <span><span class="fc-score-num" id="sc-friends">—</span><span class="fc-score-max">/5</span></span>
                </div>
                <div class="fc-bar"><div class="fc-bar-fill" id="bar-friends"></div></div>
                <div class="fc-item-text" id="txt-friends"></div>
            </div>

            <div class="fc-item">
                <div class="fc-item-head">
                    <span class="fc-item-title">Карьера</span>
                    <span><span class="fc-score-num" id="sc-career">—</span><span class="fc-score-max">/5</span></span>
                </div>
                <div class="fc-bar"><div class="fc-bar-fill" id="bar-career"></div></div>
                <div class="fc-item-text" id="txt-career"></div>
            </div>

            <div class="fc-item">
                <div class="fc-item-head">
                    <span class="fc-item-title">Финансы</span>
                    <span><span class="fc-score-num" id="sc-finance">—</span><span class="fc-score-max">/5</span></span>
                </div>
                <div class="fc-bar"><div class="fc-bar-fill" id="bar-finance"></div></div>
                <div class="fc-item-text" id="txt-finance"></div>
            </div>

            <div class="fc-item">
                <div class="fc-item-head">
                    <span class="fc-item-title">Энергия</span>
                    <span><span class="fc-score-num" id="sc-health">—</span><span class="fc-score-max">/5</span></span>
                </div>
                <div class="fc-bar"><div class="fc-bar-fill" id="bar-health"></div></div>
                <div class="fc-item-text" id="txt-health"></div>
            </div>

            <button class="fc-refresh" id="btn-refresh">Обновить прогноз</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<script>
const FORECAST_API='https://astro-v2.onrender.com';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const SR=["Овен","Телец","Близнецы","Рак","Лев","Дева","Весы","Скорпион","Стрелец","Козерог","Водолей","Рыбы"];
const SS=["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
const signOf=lon=>Math.floor((((lon%360)+360)%360)/30);
const toR=d=>d*Math.PI/180,toD=r=>r*180/Math.PI;

function JD(yr,mo,dy,hr,mn){if(mo<=2){yr--;mo+=12;}const A=Math.floor(yr/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(yr+4716))+Math.floor(30.6001*(mo+1))+dy+hr/24+mn/1440+B-1524.5;}
function sunLon(jd){const n=jd-2451545,L=(280.460+0.9856474*n)%360,g=toR((357.528+0.9856003*n)%360);return((L+1.915*Math.sin(g)+0.020*Math.sin(2*g))%360+360)%360;}
function moonLon(jd){const d=jd-2451545,L0=(218.316+13.176396*d)%360,M=toR((134.963+13.064993*d)%360),Ms=toR((357.529+0.985600*d)%360),F=toR((93.272+13.229350*d)%360),D=toR((297.850+12.190749*d)%360);const dL=6.289*Math.sin(M)-1.274*Math.sin(2*D-M)+0.658*Math.sin(2*D)-0.186*Math.sin(Ms)-0.059*Math.sin(2*M-2*D)-0.057*Math.sin(M-2*D+Ms)+0.053*Math.sin(M+2*D)+0.046*Math.sin(2*D-Ms)+0.041*Math.sin(M-Ms)-0.035*Math.sin(D)-0.031*Math.sin(M+Ms)-0.015*Math.sin(2*F-2*D)+0.011*Math.sin(M-4*D);return((L0+dL)%360+360)%360;}
function geoLon(hLon,sunL,a){const pl=toR(hLon),el=toR((sunL+180)%360),gx=a*Math.cos(pl)-Math.cos(el),gy=a*Math.sin(pl)-Math.sin(el);return((toD(Math.atan2(gy,gx))%360)+360)%360;}
function helio(jd,Lc,Ld,Mc,Md,eq){const T=(jd-2451545)/36525;let L=((Lc+Ld*T)%360+360)%360;const M=toR(((Mc+Md*(jd-2451545))%360+360)%360);eq.forEach((c,i)=>L+=c*Math.sin((i+1)*M));return((L%360)+360)%360;}
const PC={mercury:[[252.251,149474.072],[174.795,4.09233445],[23.440,2.9818,0.5255,0.1058,0.0241,0.0053],0.387],venus:[[181.980,58519.213],[212.256,1.60213034],[0.7758,0.0033],0.723],mars:[[355.433,19141.696],[19.387,0.52402068],[10.6912,0.6228,0.0503,0.0046],1.524],jupiter:[[34.352,3036.303],[20.900,0.08308529],[5.5549,0.1683,0.0071],5.203],saturn:[[50.077,1223.511],[317.021,0.03344422],[6.3585,0.2204,0.0106],9.537],uranus:[[314.055,429.864],[141.050,0.01172834],[5.3042,0.1534],19.189],neptune:[[304.349,219.883],[256.225,0.00598103],[1.0302,0.0058],30.070]};
function planetLon(jd,name){if(name==='pluto'){const T=(jd-2451545)/36525;return((238.95+144.96*T)%360+360)%360;}const[L,M,eq,a]=PC[name];return geoLon(helio(jd,L[0],L[1],M[0],M[1],eq),sunLon(jd),a);}
function retro(jd,name){const f=name==='moon'?moonLon:name==='sun'?sunLon:(j)=>planetLon(j,name);let d=f(jd+1)-f(jd-1);if(d>180)d-=360;if(d<-180)d+=360;return d<0;}
const ASTRO_BODY={mercury:'Mercury',venus:'Venus',mars:'Mars',jupiter:'Jupiter',saturn:'Saturn',uranus:'Uranus',neptune:'Neptune',pluto:'Pluto'};
function astroTime(utc){const A=window.Astronomy;return A?A.MakeTime(new Date(Date.UTC(utc.y,utc.mo-1,utc.d,utc.h,utc.mi,0))):null;}
function geoEcl(A,body,t){return((A.Ecliptic(A.GeoVector(body,t,true)).elon%360)+360)%360;}
function sunEcl(A,t){return((A.SunPosition(t).elon%360)+360)%360;}
function retroA(A,t,body){let d=geoEcl(A,body,t.AddDays(1))-geoEcl(A,body,t.AddDays(-1));if(d>180)d-=360;if(d<-180)d+=360;return d<0;}
function gmst(jd){const T=(jd-2451545)/36525;return((280.46061837+360.98564736629*(jd-2451545)+0.000387933*T*T-T*T*T/38710000)%360+360)%360;}
function obliquity(jd){const T=(jd-2451545)/36525;return 23.439291111-0.013004167*T-0.0000001639*T*T+0.0000005036*T*T*T;}
function degNorm(x){x=x%360;return x<0?x+360:x;}
function asc2(xDeg,lat,sine,cose){const VS=1e-10;let ass=-Math.tan(toR(lat))*sine+cose*Math.cos(toR(xDeg));if(Math.abs(ass)<VS)ass=0;let sinx=Math.sin(toR(xDeg));if(Math.abs(sinx)<VS)sinx=0;if(sinx===0)ass=ass<0?-VS:VS;else if(ass===0)ass=sinx<0?-90:90;else ass=toD(Math.atan2(sinx,ass));if(ass<0)ass+=180;return ass;}
function asc1(x1,lat,sine,cose){const VS=1e-10,n=Math.trunc(degNorm(x1)/90+1),f=lat;if(Math.abs(90-f)<VS)return 180;if(Math.abs(90+f)<VS)return 0;let ass;if(n===1)ass=asc2(x1,f,sine,cose);else if(n===2)ass=180-asc2(180-x1,-f,sine,cose);else if(n===3)ass=180+asc2(x1-180,-f,sine,cose);else ass=360-asc2(360-x1,f,sine,cose);return degNorm(ass);}
function ascLon(jd,lat,lon){const armc=degNorm(gmst(jd)+lon),eps=obliquity(jd);return asc1(armc+90,lat,Math.sin(toR(eps)),Math.cos(toR(eps)));}

function findCityFallback(name){const lo=name.toLowerCase().trim();for(const[k,v]of Object.entries(CITIES))if(lo.includes(k)||k.includes(lo))return{lat:v[0],lon:v[1],tzHours:v[2]};for(const[k,v]of Object.entries(CITIES))if(lo.length>=4&&k.startsWith(lo.slice(0,4)))return{lat:v[0],lon:v[1],tzHours:v[2]};return null;}
function luxonOffset(h){const s=h>=0?'+':'-',a=Math.abs(Number(h)),w=Math.floor(a+1e-9),m=Math.round((a-w)*60);return m===0?`UTC${s}${w}`:`UTC${s}${w}:${String(m).padStart(2,'0')}`;}

function isoHint(t){t=String(t).trim().toLowerCase();if(COUNTRY_ISO[t])return COUNTRY_ISO[t];if(/^[a-z]{2}$/i.test(t)){const u=t.toUpperCase();if(US_STATES.has(u))return null;return u;}return null;}
function pickGeoRow(results,raw){if(!results||!results.length)return null;let list=results;const i=raw.indexOf(',');if(i!==-1){const hint=raw.slice(i+1).trim(),iso=isoHint(hint);if(iso){const f=list.filter(r=>(r.country_code||'').toUpperCase()===iso);if(f.length)list=f;}else if(hint.length>=2){const hl=hint.toLowerCase();const f=list.filter(r=>(r.country||'').toLowerCase().includes(hl)||(r.admin1||'').toLowerCase().includes(hl));if(f.length)list=f;}}return[...list].sort((a,b)=>(b.population||0)-(a.population||0))[0];}
async function resolvePlace(q){const ck=q.toLowerCase().trim();if(_geoCache[ck])return _geoCache[ck];try{const name=q.includes(',')?q.slice(0,q.indexOf(',')).trim():q;const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=12&language=ru`,{signal:AbortSignal.timeout(5000)});if(!r.ok)throw new Error('geo');const j=await r.json();const row=j.results&&j.results.length?pickGeoRow(j.results,q):null;if(row){const p={lat:row.latitude,lon:row.longitude,timezone:row.timezone||luxonOffset(Math.round(row.longitude/15)),name:row.name||q,label:[row.name,row.admin1,row.country].filter(Boolean).join(' · '),source:'open_meteo'};_geoCache[ck]=p;return p;}}catch(e){}const fb=findCityFallback(q);if(!fb)throw new Error(`Город не найден: ${q}`);const p={lat:fb.lat,lon:fb.lon,timezone:luxonOffset(fb.tzHours),name:q,label:q,source:'local'};_geoCache[ck]=p;return p;}
function wallToUtc(y,mo,d,h,mi,zone){const DateTime=window.luxon?.DateTime;if(!DateTime)throw new Error('Luxon не загружен');const dt=DateTime.fromObject({year:y,month:mo,day:d,hour:h,minute:mi,second:0},{zone});if(!dt.isValid)throw new Error('Некорректная дата');const u=dt.toUTC();return{y:u.year,mo:u.month,d:u.day,h:u.hour,mi:u.minute};}

async function calcChart(dateStr,timeStr,cityName){
    const[d,m,y]=dateStr.split('.').map(Number);
    const hasTime=timeStr&&/^\d{2}:\d{2}$/.test(timeStr);
    let hr=12,mn=0;if(hasTime)[hr,mn]=timeStr.split(':').map(Number);
    const place=await resolvePlace(cityName);
    const lat=Number(place.lat),lon=Number(place.lon);
    const utc=wallToUtc(y,m,d,hr,mn,place.timezone);
    const jd=JD(utc.y,utc.mo,utc.d,utc.h,utc.mi);
    const A=window.Astronomy,at=A?astroTime(utc):null;
    function plLon(k){if(at&&A){if(k==='sun')return sunEcl(A,at);if(k==='moon')return geoEcl(A,A.Body.Moon,at);return geoEcl(A,A.Body[ASTRO_BODY[k]],at);}if(k==='sun')return sunLon(jd);if(k==='moon')return moonLon(jd);return planetLon(jd,k);}
    function plRetro(k){if(at&&A&&ASTRO_BODY[k])return retroA(A,at,A.Body[ASTRO_BODY[k]]);return retro(jd,k);}
    const PLANETS=[{n:'Солнце',lon:plLon('sun'),retro:false},{n:'Луна',lon:plLon('moon'),retro:false},{n:'Меркурий',lon:plLon('mercury'),retro:plRetro('mercury')},{n:'Венера',lon:plLon('venus'),retro:plRetro('venus')},{n:'Марс',lon:plLon('mars'),retro:plRetro('mars')},{n:'Юпитер',lon:plLon('jupiter'),retro:plRetro('jupiter')},{n:'Сатурн',lon:plLon('saturn'),retro:plRetro('saturn')},{n:'Уран',lon:plLon('uranus'),retro:plRetro('uranus')},{n:'Нептун',lon:plLon('neptune'),retro:plRetro('neptune')},{n:'Плутон',lon:plLon('pluto'),retro:plRetro('pluto')}];
    const asc=hasTime?ascLon(jd,lat,lon):null;
    return{jd,lat,lon,timezone:place.timezone,placeName:place.label||place.name,hasTime,planets:PLANETS,ascendant:asc};
}

const TEXTS={
    summary:{fire:["Марс активизирует твою карту — неделя насыщена. Не торопись с решениями в среду, когда напряжение достигнет пика.","Солнце дарит уверенность и ясность цели. Неделя подходит для старта нового — звёзды благосклонны.","Энергия высока, но рассеянность опасна. Сфокусируйся на главном и не распыляйся."],earth:["Сатурн напоминает о важных делах, которые откладывались. Неделя требует дисциплины — но награда весомая.","Планеты указывают на период сбора плодов. Терпение и методичность принесут результат.","Стабильная неделя с акцентом на завершение начатого. Фундамент, который ты закладываешь, держит годами."],air:["Меркурий активен — слова, идеи и встречи определяют неделю. Используй коммуникативный талант.","Интеллектуальная неделя: решения приходят через диалог. Не стесняйся советоваться.","Информационный поток высок. Фильтруй главное и не позволяй мелочам украсть фокус."],water:["Нептун усиливает интуицию — доверяй внутреннему голосу в ключевых решениях.","Эмоциональная неделя: чувства говорят громче логики. Позволь себе прислушаться.","Луна подчёркивает чувствительность. Неделя для глубоких разговоров и личных открытий."]},
    love:{fire:["Страстная неделя — Венера активизирует твою карту. Смело делай первый шаг, звёзды на твоей стороне.","Искра в воздухе ощущается. Существующие отношения обретут новую глубину, одиноким — шанс на яркую встречу.","Марс добавляет смелости сердцу. Не сдерживай чувства — искренность сейчас ценится выше осторожности."],earth:["Спокойная, уютная неделя в отношениях. Небольшие знаки внимания скажут больше громких слов.","Венера советует больше времени проводить вместе. Совместный ужин или прогулка создадут нужное настроение.","Стабильность — твой главный козырь. Близкие ценят надёжность, и это заметно."],air:["Общение — ключ ко всему на этой неделе. Разговор по душам с любимым человеком расставит всё по местам.","Лёгкость и искры в диалоге. Совместная идея или план на будущее сблизит вас больше, чем ты ожидаешь.","Флирт и остроумие — твоё оружие. Партнёр в восхищении, а если ты свободна — флирт может стать чем-то большим."],water:["Интуиция подскажет, что именно нужно сказать любимому человеку. Доверяй своим ощущениям.","Эмоциональная глубина привлекает — на этой неделе особенно. Откройся, и тебя поймут.","Луна усиливает чувствительность. Не избегай разговора о чувствах — он давно необходим."]},
    friends:{fire:["Социальная неделя: тебя тянет к людям, и это взаимно. Давняя идея провести время вместе — реализуй наконец.","Харизма на пике. Друзья рады твоей компании, а новые знакомства могут оказаться очень полезными.","Совместный проект с другом принесёт неожиданный результат. Действуй, не откладывая."],earth:["Неделя для надёжных, проверенных связей. Старый друг напомнит о себе — ответь.","Небольшой круг близких людей важнее широкого социального выхода. Качество — твой приоритет.","Помощь другу сейчас вернётся сторицей. Не отказывай, если просят о поддержке."],air:["Оживлённые встречи и интересные беседы — твоя стихия на этой неделе. Прими приглашение.","Новое знакомство может перерасти в крепкую дружбу. Будь открыта.","Групповая динамика работает на тебя. Инициируй встречу — все давно этого ждали."],water:["Чуткость к настроению друзей сделает тебя незаменимым собеседником. Один разговор может изменить многое.","Кто-то из близких нуждается в твоей поддержке, но не решается попросить. Протяни руку первой.","Интуиция подскажет, кому позвонить. Не игнорируй это ощущение."]},
    career:{fire:["Марс даёт импульс — время для смелых шагов. Презентуй идею, о которой думала.","Инициатива вознаграждается. Руководство замечает тех, кто берёт на себя ответственность.","Энергия высокая — используй её для сложных задач в начале недели, пока запал не угас."],earth:["Методичность окупается. Завершай начатое — незаконченные дела начинают давить.","Детальная проработка проекта сейчас важнее скорости. Ошибки обойдутся дороже промедления.","Коллеги оценят основательность. Тихая работа в этот период говорит сама за себя."],air:["Переговоры и коммуникации — в твою пользу. Идеальное время для встреч и договорённостей.","Свежий взгляд на старую проблему даст неожиданное решение. Доверяй своей гибкости.","Нетворкинг сейчас важнее рутины. Полезный контакт может прийти из неожиданного источника."],water:["Интуиция в рабочих вопросах особенно сильна. Доверяй первому ощущению при принятии решений.","Творческий подход к задаче удивит коллег. Не бойся предложить нестандартный путь.","Атмосфера в команде важна — ты чувствуешь её тонкости. Сгладь напряжение, и это заметят."]},
    finance:{fire:["Импульсивные траты под угрозой. Посчитай дважды перед большой покупкой.","Возможность дохода есть, но она требует действия, а не ожидания. Сделай первый шаг.","Инвестиция в себя — обучение, здоровье, инструменты — окупится быстрее, чем кажется."],earth:["Спокойная, стабильная неделя для финансов. Плановые расходы — без сюрпризов.","Момент для пересмотра бюджета и небольших накоплений. Маленький шаг сейчас — большой результат потом.","Отложи крупные покупки до следующей недели — сначала пойми, что действительно необходимо."],air:["Неожиданный финансовый разговор может открыть новые возможности. Будь внимательна к деталям.","Информация — твой главный актив на этой неделе. Изучи вопрос перед принятием решения.","Небольшая гибкость в расходах поможет использовать выгодный момент. Главное — не перегибать."],water:["Финансовая интуиция обострена. Если что-то кажется подозрительным — так и есть, не торопись.","Забытый долг или возврат может проявиться неожиданно. Неделя для финансовых сюрпризов.","Эмоциональные траты — главный риск. Не шопись на эмоциях, подожди сутки."]},
    health:{fire:["Энергия высокая, но не расходуй её бездумно. Чередуй активность с отдыхом.","Физическая нагрузка принесёт удовольствие и разрядит напряжение. Лучшее время — утро.","Следи за темпом: азарт хорош, но перегрев опасен. Пей больше воды."],earth:["Тело просит режима. Сон, еда по расписанию, прогулки — всё это даёт эффект именно сейчас.","Накопившееся напряжение даёт о себе знать. Массаж или тёплая ванна вечером — лучшее лекарство.","Умеренная нагрузка и свежий воздух восстанавливают лучше любого стимулятора."],air:["Нервная система требует внимания. Меньше экрана перед сном, больше спокойных вечеров.","Голова работает быстро, но нуждается в паузах. Практика осознанного дыхания творит чудеса.","Лёгкая физическая активность — йога, прогулки — поможет сбросить умственное напряжение."],water:["Чувствительность к окружению высокая — избегай токсичных ситуаций и людей.","Сон и водный баланс — твои главные союзники на этой неделе. Не пренебрегай.","Эмоциональное состояние напрямую влияет на физическое. Позволь себе отдых без чувства вины."]}
};

const FAV_DAYS={fire:['Вторник','Пятница'],earth:['Понедельник','Четверг'],air:['Среда','Суббота'],water:['Понедельник','Пятница']};
const ELEM_SCORE={fire:4,earth:3,air:4,water:3};
function pick(arr,seed){return arr[Math.abs(Math.floor(seed))%arr.length];}

function generateForecast(chart){
    const P=chart.planets,sunEl=elem(signOf(P[0].lon)),moonEl=elem(signOf(P[1].lon)),ascEl=chart.ascendant!=null?elem(signOf(chart.ascendant)):sunEl;
    const seed=Math.floor(chart.jd)%97,base=ELEM_SCORE[sunEl],mb=moonEl===sunEl?1:0;
    const ratings={love:Math.min(5,Math.max(1,base+mb+(seed%3)-1)),friends:Math.min(5,Math.max(1,base+(seed%2))),career:Math.min(5,Math.max(1,ELEM_SCORE[ascEl]+((seed+1)%3)-1)),finance:Math.min(5,Math.max(1,ELEM_SCORE[ascEl]+((seed+2)%2))),health:Math.min(5,Math.max(1,base+((seed+3)%3)-1))};
    return{summary:pick(TEXTS.summary[sunEl],seed),favorable_days:FAV_DAYS[sunEl],love:{rating:ratings.love,text:pick(TEXTS.love[moonEl],seed+1)},friends:{rating:ratings.friends,text:pick(TEXTS.friends[sunEl],seed+2)},career:{rating:ratings.career,text:pick(TEXTS.career[ascEl],seed+3)},finance:{rating:ratings.finance,text:pick(TEXTS.finance[ascEl],seed+4)},health:{rating:ratings.health,text:pick(TEXTS.health[moonEl],seed+5)}};
}

async function buildLocalResponse(dateStr,timeStr,cityName){
    const chart=await calcChart(dateStr,timeStr,cityName),fc=generateForecast(chart);
    const today=new Date(),mon=new Date(today);mon.setDate(today.getDate()-((today.getDay()||7)-1));
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const fmt=dt=>`${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
    const P=chart.planets;
    return{_raw:chart,_meta:{city:chart.placeName,timezone:chart.timezone},natal:{sun:{sign:SR[signOf(P[0].lon)],symbol:SS[signOf(P[0].lon)]},moon:{sign:SR[signOf(P[1].lon)],symbol:SS[signOf(P[1].lon)]},ascendant:chart.ascendant!=null?{sign:SR[signOf(chart.ascendant)]}:{sign:null}},forecast:fc,week_start:fmt(mon),week_end:fmt(sun)};
}

function showScreen(id,dir='right'){document.querySelectorAll('.screen').forEach(s=>{s.classList.toggle('hidden',s.id!==id);s.classList.toggle('slide-left',s.id!==id&&dir==='left');});}
function setStep(id,st){const el=document.getElementById(id);el.className=`step ${st}`;el.querySelector('.step-ico').textContent=st==='done'?'✓':st==='active'?id.replace('step',''):'·';}
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function showError(m){const e=document.getElementById('error-msg');e.textContent=m;e.classList.add('visible');}
function clearError(){document.getElementById('error-msg').classList.remove('visible');}

function validate(date,time,city){
    if(!/^\d{2}\.\d{2}\.\d{4}$/.test(date))return'Введи дату в формате ДД.ММ.ГГГГ';
    const[d,m,y]=date.split('.').map(Number);
    if(y<1900||y>new Date().getFullYear())return'Некорректный год рождения';
    const t=new Date(y,m-1,d);if(t.getFullYear()!==y||t.getMonth()!==m-1||t.getDate()!==d)return'Некорректная дата рождения';
    if(time){if(!/^\d{2}:\d{2}$/.test(time))return'Время: формат ЧЧ:ММ';const[hh,mm]=time.split(':').map(Number);if(hh>23||mm>59)return'Некорректное время';}
    if(!city.trim()||city.trim().length<2)return'Введи город рождения';
    return null;
}

document.getElementById('f-date').addEventListener('input',e=>{let v=e.target.value.replace(/\D/g,'');if(v.length>2)v=v.slice(0,2)+'.'+v.slice(2);if(v.length>5)v=v.slice(0,5)+'.'+v.slice(5);e.target.value=v.slice(0,10);});
document.getElementById('f-time').addEventListener('input',e=>{let v=e.target.value.replace(/\D/g,'');if(v.length>2)v=v.slice(0,2)+':'+v.slice(2);e.target.value=v.slice(0,5);});

const DAY=['пн','вт','ср','чт','пт','сб','вс'];
const DMAP={'понедельник':'пн','вторник':'вт','среда':'ср','четверг':'чт','пятница':'пт','суббота':'сб','воскресенье':'вс'};

function buildDays(ws,favDays){
    const strip=document.getElementById('fc-days');strip.innerHTML='';
    const[d,m,y]=ws.split('.').map(Number),mon=new Date(y,m-1,d),tod=new Date();
    const fav=new Set((favDays||[]).map(s=>DMAP[s.toLowerCase()]||s.toLowerCase().slice(0,2)));
    for(let i=0;i<7;i++){
        const dt=new Date(mon);dt.setDate(mon.getDate()+i);
        const isT=dt.getFullYear()===tod.getFullYear()&&dt.getMonth()===tod.getMonth()&&dt.getDate()===tod.getDate();
        const el=document.createElement('div');el.className='fc-day'+(isT?' active':fav.has(DAY[i])?' fav':'');
        el.innerHTML=`<span class="fc-day-name">${DAY[i]}</span><span class="fc-day-num">${dt.getDate()}</span>`;
        strip.appendChild(el);
    }
}

function fitSignSize(name){
    const l=name.length;
    if(l<=4)return'clamp(64px,18vw,80px)';
    if(l<=6)return'clamp(50px,14vw,64px)';
    if(l<=8)return'clamp(40px,11vw,52px)';
    return'clamp(34px,9vw,44px)';
}

function renderForecast(data){
    const{natal,forecast,week_start,week_end}=data;
    document.getElementById('fc-week-label').textContent=`${week_start} — ${week_end}`;
    const signEl=document.getElementById('fc-sign');
    signEl.textContent=natal.sun.sign.toUpperCase();
    signEl.style.fontSize=fitSignSize(natal.sun.sign);
    const sub=[];
    if(natal.ascendant&&natal.ascendant.sign)sub.push(`Асц. ${natal.ascendant.sign}`);
    sub.push(`Луна в ${natal.moon.sign}`);
    document.getElementById('fc-sign-sub').textContent=sub.join(' · ');
    document.getElementById('fc-summary').textContent=forecast.summary;
    buildDays(week_start,forecast.favorable_days);
    [['love','sc-love','bar-love','txt-love'],['friends','sc-friends','bar-friends','txt-friends'],['career','sc-career','bar-career','txt-career'],['finance','sc-finance','bar-finance','txt-finance'],['health','sc-health','bar-health','txt-health']].forEach(([k,sid,bid,tid],i)=>{
        const s=forecast[k]||{rating:3,text:''};
        document.getElementById(sid).textContent=s.rating;
        document.getElementById(tid).textContent=s.text;
        setTimeout(()=>{document.getElementById(bid).style.width=`${s.rating*20}%`;},200+i*120);
    });
    document.querySelector('.fc-scroll').scrollTop=0;
}

async function handleSubmit(){
    const date=document.getElementById('f-date').value.trim(),time=document.getElementById('f-time').value.trim(),city=document.getElementById('f-city').value.trim();
    const err=validate(date,time,city);if(err){showError(err);return;}clearError();
    showScreen('s-loading');setStep('step1','active');setStep('step2','idle');setStep('step3','idle');
    let place;
    try{place=await resolvePlace(city);}catch(e){showScreen('s-input');showError(e.message||'Город не найден.');return;}
    setStep('step1','done');setStep('step2','active');
    let data;
    try{
        const resp=await fetch(`${FORECAST_API}/api/chart`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({birth_date:date,birth_time:time||'',lat:place.lat,lon:place.lon,timezone:place.timezone,city_name:place.label||place.name||city}),signal:AbortSignal.timeout(8000)});
        if(!resp.ok)throw new Error(`${resp.status}`);
        data=await resp.json();
    }catch(e){
        console.warn('Backend недоступен, локальный расчёт:',e.message);
        try{data=await buildLocalResponse(date,time,city);}catch(e2){showScreen('s-input');showError(e2.message||'Произошла ошибка.');return;}
    }
    setStep('step2','done');setStep('step3','active');
    await delay(400);setStep('step3','done');await delay(300);
    renderForecast(data);showScreen('s-forecast');
}

document.getElementById('btn-submit').addEventListener('click',handleSubmit);
document.getElementById('btn-back').addEventListener('click',()=>showScreen('s-input','left'));
document.getElementById('btn-refresh').addEventListener('click',()=>showScreen('s-input','left'));
document.getElementById('f-city').addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit();});
</script>
